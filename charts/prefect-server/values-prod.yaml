#####################################################################
# values-prefect-autopilot.yaml
# Prefect Server on GKE Autopilot
# - built-in PostgreSQL
# - built-in Redis
# - Argo CD friendly
# - low requests, higher limits for burst / concurrency
#####################################################################
global:
  prefect:
    host: prefect.plusai.is
    image:
      prefectTag: 3.6.22-python3.13
#####################################################################
# Prefect API / UI
#####################################################################
server:
  basicAuth:
    enabled: false

  apiBasePath: /api

  uiConfig:
    prefectUiApiUrl: "https://prefect.plusai.is/api"

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPU: 80
    targetMemory: 85

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

#####################################################################
# Service / Ingress
#####################################################################
service:
  type: ClusterIP
  annotations:
    # 对 GKE Ingress/NEG 更友好
    cloud.google.com/neg: '{"ingress": true}'

backgroundServices:
  runAsSeparateDeployment: false
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 1Gi

ingress:
  enabled: true
  className: gce
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "prefect-tls-cert"
    kubernetes.io/ingress.global-static-ip-name: "prefect-static-ip"
    # 可选：如果你要 HTTPS redirect / SSL policy，再配 FrontendConfig
    # networking.gke.io/frontend-config: "prefect-frontend-config"

  host:
    hostname: "prefect.plusai.is"
    path: /
    pathType: Prefix

#####################################################################
# Built-in PostgreSQL
#####################################################################
postgresql:
  enabled: true
  auth:
    username: prefect
    database: server
    existingSecret: prefect-postgresql-auth
    secretKeys:
      userPasswordKey: password

  primary:
    persistence:
      enabled: true
      storageClass: standard-rwo
      size: 20Gi

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

#####################################################################
# Keep auto-created DB connection secret
#####################################################################
secret:
  create: false


#####################################################################
# ServiceAccounts
#####################################################################
serviceAccount:
  create: true

migrations:
  # -- enable the migration Job during chart upgrades (only applies when backgroundServices.runAsSeparateDeployment is true)
  enabled: false